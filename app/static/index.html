<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interview Manager — Candidate Portal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>🎙️ Interview Manager</h1>
    <nav class="nav">
      <a href="/index.html">Candidate Portal</a>
      <a href="/admin.html">Admin</a>
    </nav>
  </header>

  <main>
    <!-- Sign in -->
    <section id="signin" class="card">
      <h2>Sign in / Register</h2>
      <p class="muted">Enter your details to request and track interviews. We match you by email.</p>
      <div class="row">
        <div><label>Name</label><input id="su-name" placeholder="Ada Lovelace" /></div>
        <div><label>Email</label><input id="su-email" placeholder="ada@example.com" /></div>
      </div>
      <div class="row">
        <div><label>Timezone (IANA)</label><input id="su-tz" placeholder="UTC" /></div>
        <div><label>Phone (optional)</label><input id="su-phone" placeholder="+1 555 0100" /></div>
      </div>
      <button id="su-go">Continue</button>
    </section>

    <!-- Signed-in area -->
    <section id="app" class="hidden">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <h2 style="margin:0;">Welcome, <span id="who"></span></h2>
            <div class="muted" id="who-tz"></div>
          </div>
          <button class="ghost" id="signout">Sign out</button>
        </div>
      </div>

      <div class="card">
        <h2>Request an interview</h2>
        <label>Role / topic</label>
        <input id="rq-role" placeholder="Senior Backend Engineer" />
        <div class="row">
          <div><label>Preferred time (optional)</label><input id="rq-when" type="datetime-local" /></div>
          <div><label>Duration (min)</label><input id="rq-dur" type="number" value="30" min="5" max="480" /></div>
        </div>
        <label>Notes (optional)</label>
        <textarea id="rq-notes" placeholder="Anything the interviewer should know..."></textarea>
        <button id="rq-go">Submit request</button>
      </div>

      <div class="card">
        <h2>My interviews</h2>
        <table>
          <thead>
            <tr><th>Role</th><th>Status</th><th>Scheduled</th><th>Payment</th><th></th></tr>
          </thead>
          <tbody id="my-interviews"></tbody>
        </table>
      </div>

      <div class="card">
        <h2>Notifications</h2>
        <div id="my-notifs"></div>
      </div>
    </section>
  </main>

  <script src="/common.js"></script>
  <script src="/portal.js"></script>
</body>
</html>
